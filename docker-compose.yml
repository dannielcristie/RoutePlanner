version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: routeplanner_backend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
    container_name: routeplanner_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
